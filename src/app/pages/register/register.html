<div class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-12 col-sm-8 col-md-6 col-lg-4">
			<div class="card shadow-sm">
				<div class="card-body">
					<h3 class="card-title mb-3">Create Account</h3>
					<div *ngIf="error" class="visually-hidden" aria-live="assertive">{{ error }}</div>

					<div class="mb-3">
						<label class="form-label">Email</label>
						<input #email type="email" class="form-control" placeholder="you@example.com" />
						<div *ngIf="emailError" class="form-text text-danger">{{ emailError }}</div>
					</div>

					<div class="mb-3">
						<label class="form-label">Password</label>
						<input #password type="password" class="form-control" />
						<div *ngIf="passwordError" class="form-text text-danger">{{ passwordError }}</div>
					</div>

					<div class="mb-3">
						<label class="form-label">Account Type</label>
						<div>
							<div class="form-check">
								<input class="form-check-input" type="radio" name="role" id="buyer" value="buyer" #buyerRole checked />
								<label class="form-check-label" for="buyer">
									Buyer (shop products)
								</label>
							</div>
							<div class="form-check">
								<input class="form-check-input" type="radio" name="role" id="seller" value="seller" #sellerRole />
								<label class="form-check-label" for="seller">
									Seller (manage sales)
								</label>
							</div>
						</div>
					</div>

					<div class="d-grid">
						<button class="btn btn-primary" (click)="register(email.value, password.value, buyerRole.checked ? 'buyer' : 'seller')">Create account</button>
					</div>

					<p class="mt-3 text-center mb-0">Already have an account? <a routerLink="/login">Login</a></p>
				</div>
			</div>
		</div>
	</div>
</div>
