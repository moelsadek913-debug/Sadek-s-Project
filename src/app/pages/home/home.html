<div class="container mt-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">Products</h2>
    <div class="input-group w-100 w-md-50">
      <input type="search" class="form-control form-control-sm" placeholder="Search products..." (input)="onSearch($event.target.value)">
    </div>
  </div>

  <div class="row gx-3 gy-4">
    <div *ngFor="let p of filtered; trackBy: trackById" class="col-12 col-sm-6 col-md-4">
      <div class="card h-100 shadow-sm hover-lift">
        <img [src]="p.image" class="card-img-top" [alt]="p.title" style="height: 200px; object-fit: cover;">
        <div class="card-body d-flex flex-column">
          <h6 class="card-title">{{ p.title }}</h6>
          <p class="card-text flex-grow-1">{{ p.description }}</p>
          <div class="mt-auto d-flex justify-content-between align-items-center">
            <span class="h5 text-primary fw-bold">${{ p.price.toFixed(2) }}</span>
            <div class="btn-group btn-group-sm">

              <button class="btn btn-outline-danger btn-sm me-1 p-2" (click)="toggleWishlist(p)" [title]="wishlist.isInWishlist(p.id) ? 'Remove from wishlist' : 'Add to wishlist'">
                <i class="bi" [class.bi-heart]="!wishlist.isInWishlist(p.id)" [class.bi-heart-fill]="wishlist.isInWishlist(p.id)"></i>
              </button>
              <button class="btn btn-outline-success me-1" (click)="addToCart(p)">Add to Cart</button>
              <a class="btn btn-primary" [routerLink]="['/product', p.id]">View</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
