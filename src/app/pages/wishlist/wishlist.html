<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Wishlist ({{ items().length }})</h2>
    <a class="btn btn-outline-secondary" routerLink="/home">
      <i class="bi bi-arrow-left me-1"></i>Continue Shopping
    </a>
  </div>

  <div *ngIf="items().length === 0" class="text-center py-5">
    <i class="bi bi-heart display-1 text-muted mb-3"></i>
    <h4>Wishlist is empty</h4>
    <p class="text-muted">Save items you like for later!</p>
    <a class="btn btn-primary" routerLink="/home">Browse Products</a>
  </div>

  <div class="row g-4" *ngIf="items().length > 0">
    <div *ngFor="let item of items(); trackBy: trackById" class="col-12 col-md-6 col-lg-4">
      <div class="card h-100 shadow-sm">
        <img [src]="item.image" [alt]="item.title" class="card-img-top" style="height: 200px; object-fit: cover;">
        <div class="card-body">
          <h6 class="card-title">{{ item.title }}</h6>
          <p class="card-text">${{ item.price.toFixed(2) }}</p>
          <div class="d-grid gap-2">
            <a class="btn btn-primary" [routerLink]="['/product', item.id]">View Details</a>
            <button class="btn btn-outline-success" (click)="addToCart(item)">Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
