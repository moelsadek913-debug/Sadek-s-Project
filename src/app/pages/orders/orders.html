<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Orders ({{ orders().length }})</h2>
    <a class="btn btn-outline-secondary" routerLink="/dashboard">
      <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
    </a>
  </div>

  <div *ngIf="orders().length === 0" class="text-center py-5">
    <i class="bi bi-box display-1 text-muted mb-3"></i>
    <h4>No orders yet</h4>
    <p class="text-muted">Your orders will appear here.</p>
    <a class="btn btn-primary" routerLink="/home">Shop Now</a>
  </div>

  <div class="row g-4" *ngIf="orders().length > 0">
    <div *ngFor="let order of orders(); trackBy: trackById" class="col-12">
      <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-start">
          <h6 class="mb-0">Order #{{ order.id }}</h6>
          <span class="badge" [class]="'bg-' + getStatusBadge(order.status)">{{ order.status }}</span>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-3">
              <strong>Date:</strong> {{ order.date }}
            </div>
            <div class="col-md-3">
              <strong>Total:</strong> ${{ order.total.toFixed(2) }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
